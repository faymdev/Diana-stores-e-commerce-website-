<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us – Diana Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Styles -->
  <link rel="stylesheet" href="./assets/css/style.css">
  <script src="./assets/js/script.js" defer></script>

  <!-- Ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</head>
<body>

  <!-- Overlay -->
  <div class="overlay" data-overlay></div>

  <!-- HEADER -->
  <header class="header" data-header>
    <div class="container">
      <a href="index.html" class="logo">Diana Store</a>

      <div class="input-wrapper">
        <input type="search" name="search" placeholder="Search product..." class="input-field">
        <ion-icon name="search-outline"></ion-icon>
      </div>

      <div class="header-action">
        <a href="login.html" class="header-action-btn"><ion-icon name="person-outline"></ion-icon></a>

        <a href="cart.html" class="header-action-btn"><ion-icon name="bag-handle-outline"></ion-icon><span class="btn-badge">0</span></a>
        <button class="header-action-btn" data-nav-toggler><ion-icon name="menu-outline"></ion-icon></button>
      </div>
    </div>
  </header>

  <!-- SIDEBAR NAV -->
  <nav class="sidebar" data-navbar>
    <div class="nav-close-btn" data-nav-toggler>
      <ion-icon name="close-outline"></ion-icon>
    </div>
    <ul class="navbar-list">
      <li><a href="index.html" class="navbar-link" data-nav-link>Home</a></li>
      <li><a href="about.html" class="navbar-link" data-nav-link>About</a></li>
      <li><a href="product.html" class="navbar-link" data-nav-link>Products</a></li>
      
      <li><a href="cart.html" class="navbar-link" data-nav-link>Cart</a></li>
      <li><a href="contact-us.html" class="navbar-link active" data-nav-link>Contact</a></li>
    </ul>
  </nav>

  <!-- MAIN CONTACT SECTION -->
  <main class="section contact-section">
    <div class="container">
      <h2 class="h2 section-title">Get in Touch</h2>
      <p class="section-text">We'd love to hear from you! Reach out for any questions, feedback, or custom orders.</p>

      <div class="grid-list" style="gap: 40px; margin-top: 40px;">
        <!-- Contact Form -->
        <div class="contact-form">
          <form action="#" method="POST" class="section">
            <div style="margin-bottom: 15px;">
              <input type="text" name="name" placeholder="Your Name" required class="input-field">
            </div>
            <div style="margin-bottom: 15px;">
              <input type="email" name="email" placeholder="Your Email" required class="input-field">
            </div>
            <div style="margin-bottom: 15px;">
              <textarea name="message" placeholder="Your Message" rows="6" required class="input-field"></textarea>
            </div>
            <a href="thankyou.html" class="big-contact-btn">Send Message</a>

          </form>
        </div>

        <!-- Google Map -->
        <div class="map-box">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d126845.57821860795!2d3.278206139753858!3d6.5243792652263645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x103bf44d0f94d9ff%3A0x88a4bda0dc29030f!2sLagos%2C%20Nigeria!5e0!3m2!1sen!2sng!4v1700000000000"
            width="100%" height="100%" style="border:0; border-radius: 10px;" allowfullscreen="" loading="lazy">
          </iframe>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <div class="footer-brand">
          <a href="#" class="logo">Diana Store</a>
          <p class="section-text">We help you style your space, your way.</p>
          <ul class="social-list">
            <li><a href="#" class="social-link"><ion-icon name="logo-facebook"></ion-icon></a></li>
            <li><a href="#" class="social-link"><ion-icon name="logo-instagram"></ion-icon></a></li>
            <li><a href="#" class="social-link"><ion-icon name="logo-twitter"></ion-icon></a></li>
          </ul>
        </div>
      </div>
      <p class="copyright">
        &copy; 2025 Diana Store. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- BACK TO TOP -->
  <a href="#top" class="back-top-btn" data-back-top-btn>
    <ion-icon name="arrow-up-outline"></ion-icon>
  </a>

</body>
</html>
